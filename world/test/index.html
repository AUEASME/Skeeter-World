<html>
  <script type="text/javascript">
    const GRID_SIZE = 48;
    const CELL_SIZE = 16;
    const CANVAS_SIZE = GRID_SIZE * CELL_SIZE;

    let canvas, ctx;
    let isDrawing = false;
    let currentColor = "LightSeaGreen";
    let lastCell = null;

    // 48x48 logical "pixel" buffer
    const pixels = Array.from({ length: GRID_SIZE }, () =>
      Array.from({ length: GRID_SIZE }, () => "ForestGreen"),
    );

    function init() {
      canvas = document.getElementById("can");
      canvas.width = CANVAS_SIZE;
      canvas.height = CANVAS_SIZE;
      ctx = canvas.getContext("2d");

      render();

      canvas.addEventListener("mousedown", (e) => findxy("down", e), false);
      canvas.addEventListener("mousemove", (e) => findxy("move", e), false);
      canvas.addEventListener("mouseup", () => findxy("up"), false);
      canvas.addEventListener("mouseout", () => findxy("out"), false);
    }

    function color(obj) {
      // Remove activeColor class from all color buttons.
      document
        .querySelectorAll(".colorButton")
        .forEach((btn) => btn.classList.remove("activeColor"));
      // Set the currentColor to the id of the clicked color button.
      currentColor = obj.id;
      // Add activeColor class to the selected color button.
      document.querySelectorAll(".colorButton").forEach((btn) => {
        btn.classList.toggle("activeColor", btn === obj);
      });
    }

    function save() {
      // Replace "ForestGreen" with "grass."
      pixels.forEach((row) =>
        row.forEach((color, i, arr) => {
          if (color === "ForestGreen") arr[i] = "grass";
        }),
      );

      // Replace "LightSeaGreen" with "water."
      pixels.forEach((row) =>
        row.forEach((color, i, arr) => {
          if (color === "LightSeaGreen") arr[i] = "water";
        }),
      );

      // Replace "SaddleBrown" with "mountain."
      pixels.forEach((row) =>
        row.forEach((color, i, arr) => {
          if (color === "SaddleBrown") arr[i] = "mountain";
        }),
      );
    }

    function getCellFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;

      const px = (e.clientX - rect.left) * sx;
      const py = (e.clientY - rect.top) * sy;

      const cx = Math.max(
        0,
        Math.min(GRID_SIZE - 1, Math.floor(px / CELL_SIZE)),
      );
      const cy = Math.max(
        0,
        Math.min(GRID_SIZE - 1, Math.floor(py / CELL_SIZE)),
      );
      return { x: cx, y: cy };
    }

    function paintCell(cx, cy) {
      pixels[cy][cx] = currentColor;
    }

    // Bresenham line on cell coordinates (for smooth drag painting)
    function paintLine(c0, c1) {
      let x0 = c0.x,
        y0 = c0.y;
      const x1 = c1.x,
        y1 = c1.y;
      const dx = Math.abs(x1 - x0);
      const dy = Math.abs(y1 - y0);
      const sx = x0 < x1 ? 1 : -1;
      const sy = y0 < y1 ? 1 : -1;
      let err = dx - dy;

      while (true) {
        paintCell(x0, y0);
        if (x0 === x1 && y0 === y1) break;
        const e2 = 2 * err;
        if (e2 > -dy) {
          err -= dy;
          x0 += sx;
        }
        if (e2 < dx) {
          err += dx;
          y0 += sy;
        }
      }
    }

    function render() {
      // Fill logical pixels
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          ctx.fillStyle = pixels[y][x];
          ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
      }

      // Grid overlay.
      ctx.strokeStyle = "DarkGreen";
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID_SIZE; i++) {
        const p = i * CELL_SIZE + 0.5;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, CANVAS_SIZE);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(CANVAS_SIZE, p);
        ctx.stroke();
      }

      // Border
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 1;
      ctx.strokeRect(0.5, 0.5, CANVAS_SIZE - 1, CANVAS_SIZE - 1);
    }

    function findxy(res, e) {
      if (res === "down") {
        isDrawing = true;
        const cell = getCellFromEvent(e);
        paintCell(cell.x, cell.y);
        lastCell = cell;
        render();
        return;
      }

      if (res === "up" || res === "out") {
        isDrawing = false;
        lastCell = null;
        return;
      }

      if (res === "move" && isDrawing) {
        const cell = getCellFromEvent(e);
        if (!lastCell || cell.x !== lastCell.x || cell.y !== lastCell.y) {
          paintLine(lastCell ?? cell, cell);
          lastCell = cell;
          render();
        }
      }
    }
  </script>

  <style>
    .colorButton {
      cursor: pointer;
      border: 2px ridge #000;
    }

    .activeColor {
      border: 2px ridge red;
    }
  </style>

  <body onload="init()">
    <canvas
      id="can"
      width="768"
      height="768"
      style="position: absolute; top: 10%; left: 10%; border: 2px solid"
    ></canvas>

    <div style="position: absolute; top: 12%; left: 43%">Choose Color</div>
    <div
      style="
        position: absolute;
        top: 15%;
        left: 45%;
        width: 16px;
        height: 16px;
        background: ForestGreen;
      "
      id="ForestGreen"
      class="colorButton"
      onclick="color(this)"
    ></div>
    <div
      style="
        position: absolute;
        top: 15%;
        left: 46%;
        width: 16px;
        height: 16px;
        background: LightSeaGreen;
      "
      id="LightSeaGreen"
      class="colorButton activeColor"
      onclick="color(this)"
    ></div>
    <div
      style="
        position: absolute;
        top: 15%;
        left: 47%;
        width: 16px;
        height: 16px;
        background: SaddleBrown;
      "
      id="SaddleBrown"
      class="colorButton"
      onclick="color(this)"
    ></div>
  </body>
</html>
